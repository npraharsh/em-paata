<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Em Paata</title>

<style>
:root{
  --bg:#fff8e7;
  --card:#fff3cc;
  --text:#3b1f0f;
  --muted:#8a5c2c;

  --accent:#c62828;
  --accent-2:#e53935;

  --tile:#f7d488;
  --wrong:#d7a86e;
  --correct:#2e7d32;

  --gold:#d4af37;
  --orange:#ff7043;

  --shadow:0 8px 25px rgba(198, 40, 40, 0.2);
  --radius:18px;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:linear-gradient(
    135deg,
    #fff8e7 0%,
    #ffe0b2 40%,
    #ffcc80 100%
  );
  color:var(--text);
  font-family:'Segoe UI',sans-serif;
  display:flex;
  justify-content:center;
  padding:16px;
  min-height:100svh;
}

.container{
  width:100%;
  max-width:420px;
  background:var(--card);
  padding:18px;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  border:2px solid var(--gold);
}

h1{
  text-align:center;
  color:var(--accent);
  margin:0;
  font-weight:800;
  letter-spacing:1px;
}

.subtitle{
  text-align:center;
  color:var(--muted);
  font-size:0.9rem;
  margin-bottom:6px;
}

.nextPuzzle{
  text-align:center;
  color:var(--muted);
  font-size:0.82rem;
  margin-bottom:10px;
  font-weight:600;
}

.progress{
  display:flex;
  gap:5px;
  margin:14px 0;
}

.bar{
  flex:1;
  height:6px;
  background:#f0c674;
  border-radius:10px;
}

.bar.active{
  background:var(--gold);
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

button{
  border:none;
  border-radius:10px;
  padding:11px;
  background:linear-gradient(180deg, var(--accent), #8e0000);
  color:white;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(198,40,40,0.25);
}

button.secondary{
  background:linear-gradient(180deg, var(--orange), #e65100);
  color:white;
}

input{
  width:100%;
  margin-top:8px;
  padding:11px;
  border-radius:10px;
  border:1px solid #e0b97d;
  background:#fffaf0;
  color:var(--text);
}

#submitBtn,
#shareBtn{
  width:100%;
  margin-top:10px;
}

.gridLabels{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:12px;
}

.gridLabels div{
  text-align:center;
  font-size:0.75rem;
  color:var(--muted);
  font-weight:600;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:6px;
}

.tile{
  height:32px;
  border-radius:7px;
  background:var(--tile);
  transform:rotateX(90deg);
}

.tile.flip{
  animation:flip 0.5s forwards;
}

@keyframes flip{
  to{
    transform:rotateX(0deg);
  }
}

.correct{
  background:var(--correct);
  box-shadow:0 0 10px rgba(46,125,50,0.4);
}

.wrong{
  background:var(--wrong);
}

.result{
  text-align:center;
  margin-top:12px;
  min-height:24px;
  font-weight:600;
  color:#4e342e;
}

@media (max-width: 420px){
  .container{
    padding:16px;
  }

  .tile{
    height:30px;
  }

  .gridLabels div{
    font-size:0.72rem;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>🎵 Em Paata</h1>
  <div class="subtitle">Guess the song, movie, and hero</div>
  <div class="nextPuzzle" id="nextPuzzle">Next puzzle in --:--:--</div>

  <div class="progress" id="progress"></div>

  <audio id="player" preload="metadata"></audio>

  <div class="controls">
    <button id="playBtn">Play</button>
    <button id="skipBtn" class="secondary">Skip</button>
  </div>

  <input id="songInput" placeholder="Song">
  <input id="movieInput" placeholder="Movie">
  <input id="heroInput" placeholder="Hero">

  <button id="submitBtn">Submit</button>

  <div class="gridLabels">
    <div>🎵 Song</div>
    <div>🎬 Movie</div>
    <div>🧑 Hero</div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="result" id="resultBox"></div>

  <button id="shareBtn" style="display:none">Share</button>
</div>

<script>
const songs = [
  {
    title: "Samajavaragamana",
    movie: "Ala Vaikunthapurramuloo",
    hero: ["Allu Arjun"],
    audio: "songs/samajavaragamana.mp3"
  },
  {
    title: "Hoyna Hoyna",
    movie: "Gang Leader",
    hero: ["Nani"],
    audio: "songs/hoyna.mp3"
  },
  {
    title: "Kanulanu Thaake",
    movie: "Manam",
    hero: ["Nagarjuna", "Naga Chaitanya", "ANR"],
    audio: "songs/kanulanu.mp3"
  }
];

function getDailyIndex() {
  const start = new Date(2024, 0, 1);
  const today = new Date();
  const diff = Math.floor((today - start) / 86400000);
  return diff % songs.length;
}

const currentSong = songs[getDailyIndex()];
const maxAttempts = 6;
const clipDurations = [1, 2, 4, 7, 11, 16];

const player = document.getElementById("player");
const progress = document.getElementById("progress");
const grid = document.getElementById("grid");
const resultBox = document.getElementById("resultBox");
const shareBtn = document.getElementById("shareBtn");
const playBtn = document.getElementById("playBtn");
const skipBtn = document.getElementById("skipBtn");
const submitBtn = document.getElementById("submitBtn");
const songInput = document.getElementById("songInput");
const movieInput = document.getElementById("movieInput");
const heroInput = document.getElementById("heroInput");
const nextPuzzle = document.getElementById("nextPuzzle");

player.src = currentSong.audio;

const state = {
  round: 0,
  tries: 0,
  solved: [false, false, false],
  history: [],
  finished: false,
  stopTimer: null
};

function normalize(str) {
  return str.toLowerCase().trim();
}

function normalizeLoose(str) {
  return normalize(str)
    .replace(/[^a-z0-9\s]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function isCorrect(input, answer) {
  const a = normalizeLoose(input);
  const b = normalizeLoose(answer);

  if (!a) return false;
  if (a.length < 2) return false;
  if (a === b) return true;
  if (a.length >= 3 && b.startsWith(a)) return true;

  return false;
}

function addRow(results) {
  results.forEach((isGreen, i) => {
    const tile = document.createElement("div");
    tile.className = "tile";

    setTimeout(() => {
      tile.classList.add("flip");
      tile.classList.add(isGreen ? "correct" : "wrong");
    }, i * 150);

    grid.appendChild(tile);
  });

  state.history.push([...results]);
}

function updateBars() {
  document.querySelectorAll(".bar").forEach((bar, i) => {
    bar.classList.toggle("active", i < state.tries);
  });
}

for (let i = 0; i < maxAttempts; i++) {
  const bar = document.createElement("div");
  bar.className = "bar";
  progress.appendChild(bar);
}

function finishWin() {
  state.finished = true;
  resultBox.innerHTML = "🎉 Correct!";
  shareBtn.style.display = "block";
}

function finishLoss() {
  state.finished = true;
  resultBox.innerHTML = `❌ ${currentSong.title} • ${currentSong.movie} • ${currentSong.hero.join(", ")}`;
  shareBtn.style.display = "block";
}

function consume(results) {
  addRow(results);
  state.tries++;
  state.round++;
  updateBars();

  if (results.every(Boolean)) {
    finishWin();
    return;
  }

  if (state.tries >= maxAttempts) {
    finishLoss();
  }
}

submitBtn.onclick = () => {
  if (state.finished) return;

  const currentResults = [
    isCorrect(songInput.value, currentSong.title),
    isCorrect(movieInput.value, currentSong.movie),
    currentSong.hero.some(heroName => isCorrect(heroInput.value, heroName))
  ];

  const mergedResults = [
    state.solved[0] || currentResults[0],
    state.solved[1] || currentResults[1],
    state.solved[2] || currentResults[2]
  ];

  state.solved = [...mergedResults];
  consume(mergedResults);
};

skipBtn.onclick = () => {
  if (state.finished) return;
  consume([...state.solved]);
};

playBtn.onclick = async () => {
  if (state.finished) return;

  clearTimeout(state.stopTimer);

  player.pause();
  player.currentTime = 0;

  try {
    await player.play();
  } catch {
    resultBox.innerHTML = "Audio could not play.";
    return;
  }

  const duration = clipDurations[Math.min(state.round, clipDurations.length - 1)];

  state.stopTimer = setTimeout(() => {
    player.pause();
    player.currentTime = 0;
  }, duration * 1000);
};

shareBtn.onclick = async () => {
  const won = state.history.some(row => row.every(Boolean));
  let text = `Em Paata ${won ? state.tries : "X"}/${maxAttempts}\n`;

  state.history.forEach(row => {
    row.forEach(cell => {
      text += cell ? "🟩" : "⬛";
    });
    text += "\n";
  });

  try {
    await navigator.clipboard.writeText(text);
    alert("Copied!");
  } catch {
    alert(text);
  }
};

function updateNextPuzzleTimer() {
  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setHours(24, 0, 0, 0);

  const diff = tomorrow - now;

  const hours = String(Math.floor(diff / 3600000)).padStart(2, "0");
  const minutes = String(Math.floor((diff % 3600000) / 60000)).padStart(2, "0");
  const seconds = String(Math.floor((diff % 60000) / 1000)).padStart(2, "0");

  nextPuzzle.textContent = `Next puzzle in ${hours}:${minutes}:${seconds}`;
}

function startNextPuzzleTimer() {
  updateNextPuzzleTimer();
  setInterval(updateNextPuzzleTimer, 1000);
}

startNextPuzzleTimer();
updateBars();
</script>

</body>
</html>
