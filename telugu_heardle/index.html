<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Em Paata</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0f0f0f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  width:400px;
  background:#1a1a1a;
  padding:20px;
  border-radius:16px;
  box-shadow:0 0 20px rgba(255,0,100,0.2);
}

h1 { text-align:center; color:#ff2e63; }

.progress { display:flex; gap:5px; margin:15px 0; }

.bar {
  flex:1;
  height:8px;
  background:#333;
  border-radius:4px;
}

.bar.active { background:#ff2e63; }

/* waveform */
.wave {
  display:flex;
  justify-content:center;
  gap:3px;
  margin:10px 0;
}

.wave div {
  width:4px;
  height:10px;
  background:#ff2e63;
  animation:wave 1s infinite;
}

.wave div:nth-child(2){animation-delay:0.2s;}
.wave div:nth-child(3){animation-delay:0.4s;}
.wave div:nth-child(4){animation-delay:0.6s;}

@keyframes wave {
  0%{height:5px;}
  50%{height:20px;}
  100%{height:5px;}
}

.controls {
  display:flex;
  justify-content:center;
  gap:10px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ff2e63;
  color:white;
  cursor:pointer;
}

input {
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#2a2a2a;
  color:white;
}

/* grid */
.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5px;
  margin-top:10px;
}

.tile {
  height:40px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#333;
  border-radius:6px;
  transform:rotateX(90deg);
}

.tile.flip {
  animation:flip 0.5s forwards;
}

@keyframes flip {
  to { transform:rotateX(0deg); }
}

.correct { background:#00ffae; }
.wrong { background:#444; }

.result { text-align:center; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<h1>🎵 Em Paata</h1>

<div class="progress" id="progress"></div>

<div class="wave" id="wave" style="display:none">
  <div></div><div></div><div></div><div></div>
</div>

<audio id="player"></audio>

<div class="controls">
  <button id="playBtn">▶ Play</button>
  <button id="skipBtn">Skip</button>
</div>

<input id="songInput" placeholder="Song">
<input id="movieInput" placeholder="Movie">
<input id="heroInput" placeholder="Hero">

<button id="submitBtn">Submit</button>

<div class="grid" id="grid"></div>

<div class="result" id="resultBox"></div>

<button id="shareBtn" style="display:none">Share</button>

</div>

<script>
// ================= DATA =================
const songs = [
  {
    title:"Samajavaragamana",
    movie:"Ala Vaikunthapurramuloo",
    hero:["Allu Arjun"],
    audio:"songs/samajavaragamana.mp3"
  },
  {
    title:"Hoyna Hoyna",
    movie:"Gang Leader",
    hero:["Nani"],
    audio:"songs/hoyna.mp3"
  },
  {
    title:"Kanulanu Thaake",
    movie:"Manam",
    hero:["Nagarjuna","Naga Chaitanya","ANR"],
    audio:"songs/kanulanu.mp3"
  }
];

// ================= DAILY PUZZLE =================
function getDailyIndex(){
  const start = new Date(2024,0,1);
  const today = new Date();
  const diff = Math.floor((today-start)/86400000);
  return diff % songs.length;
}

const currentSong = songs[getDailyIndex()];
player.src = currentSong.audio;

// ================= STATE =================
const state = { round:0, tries:0, finished:false, stopTimer:null, history:[] };
const clipDurations = [1,2,4,7,11,16];

// ================= UTIL =================
const norm = s=>s.trim().toLowerCase();

function match(a,b){
  a=norm(a); b=norm(b);
  return a===b || a.includes(b) || b.includes(a);
}

// ================= AUDIO =================
async function playClip(){
  if(state.finished) return;

  wave.style.display="flex";

  player.currentTime=0;
  await player.play();

  setTimeout(()=>{
    player.pause();
    player.currentTime=0;
    wave.style.display="none";
  }, clipDurations[state.round]*1000);
}

// ================= GRID =================
function addRow(results){
  const row = document.createElement("div");
  row.style.display="contents";

  results.forEach((r,i)=>{
    const tile = document.createElement("div");
    tile.className="tile";
    setTimeout(()=>{
      tile.classList.add("flip");
      tile.classList.add(r?"correct":"wrong");
    }, i*200);
    grid.appendChild(tile);
  });

  state.history.push(results);
}

// ================= GUESS =================
function submit(){
  if(state.finished) return;

  const res = [
    match(songInput.value,currentSong.title),
    match(movieInput.value,currentSong.movie),
    currentSong.hero.some(h=>match(heroInput.value,h))
  ];

  addRow(res);

  if(res.every(x=>x)){
    state.finished=true;
    resultBox.innerHTML="🎉 Perfect!";
    shareBtn.style.display="block";
    return;
  }

  state.tries++;
  state.round++;

  if(state.tries>=6){
    state.finished=true;
    resultBox.innerHTML=`❌ ${currentSong.title}`;
    shareBtn.style.display="block";
  }
}

// ================= SHARE =================
function share(){
  let text="Em Paata\n";

  state.history.forEach(row=>{
    row.forEach(c=>{
      text+= c ? "🟩" : "⬛";
    });
    text+="\n";
  });

  navigator.clipboard.writeText(text);
  alert("Copied to clipboard!");
}

// ================= PROGRESS =================
for(let i=0;i<6;i++){
  const b=document.createElement("div");
  b.className="bar";
  progress.appendChild(b);
}

function updateBars(){
  document.querySelectorAll(".bar")
    .forEach((b,i)=>b.classList.toggle("active",i<=state.round));
}

// EVENTS
playBtn.onclick=playClip;
submitBtn.onclick=submit;
skipBtn.onclick=()=>{state.tries++;state.round++;updateBars();}
shareBtn.onclick=share;

updateBars();
</script>

</body>
</html>
